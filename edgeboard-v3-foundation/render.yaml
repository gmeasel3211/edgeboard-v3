databases:
  - name: edgeboard-db
    plan: free
    databaseName: edgeboard
    user: edgeboard

services:
  - type: web
    name: edgeboard-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.bootstrap && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edgeboard-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://edgeboard-web.onrender.com
      - key: FRONTEND_URL
        value: https://edgeboard-web.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_ELITE_PRICE_ID
        sync: false

  - type: web
    name: edgeboard-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.15.1
      - key: NEXT_PUBLIC_API_URL
        value: https://edgeboard-api.onrender.com
